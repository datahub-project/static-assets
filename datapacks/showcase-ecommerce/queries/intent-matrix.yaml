# Showcase E-Commerce — SQL Intent Matrix
#
# 50 intents distributed across the 5 data products, ~3-5 variants each.
# Each intent will produce a directory under queries/<intent_id>/ with .sql files.
#
# Schema for each intent:
#   id: unique snake_case identifier (becomes directory name)
#   data_product: which of the 5 data products this serves
#   persona: primary author persona
#   question: the user-intent in natural language (will seed the anchor)
#   metric: which canonical KPI (if any) this anchors to
#   primary_tables: tables the canonical variant touches
#   variants: planned set of axes to vary (selected so each intent has 3-5 distinct shapes)
#   notes: any data-reality caveat (e.g. order_status is numeric in real data)
#
# Persona shorthand: SDA=Senior Data Analyst, AE=Analytics Engineer, BID=BI Developer,
# DS=Data Scientist, PM=Product Manager, DE=Data Engineer, DQE=Data Quality Engineer,
# DSt=Data Steward, DIR=Director of Data Eng

# =============================================================
# DATA PRODUCT: Order Entry Analytics  (15 intents)
# Domain: Ecommerce Operations
# =============================================================

- id: gmv_monthly_trend
  data_product: Order Entry Analytics
  persona: SDA
  question: "What is our monthly GMV over the last 12 months?"
  metric: GMV
  primary_tables: [orders]
  variants: [canonical_raw, mart_shortcut, with_yoy_compare, missing_status_filter_anti]
  notes: order_status is numeric (0-4), reference filter NOT IN ('Cancelled','On Hold') won't apply as written

- id: daily_order_volume_30d
  data_product: Order Entry Analytics
  persona: SDA
  question: "How many orders did we get per day for the last 30 days?"
  metric: null
  primary_tables: [orders]
  variants: [canonical, with_running_total, with_dow_breakdown, mart_version]

- id: aov_monthly
  data_product: Order Entry Analytics
  persona: BID
  question: "What is the Average Order Value (AOV) by month?"
  metric: AOV
  primary_tables: [orders]
  variants: [canonical_raw, mart_version, weighted_avg_anti, with_prior_year_compare]

- id: top_products_by_revenue
  data_product: Order Entry Analytics
  persona: SDA
  question: "Show me the top 20 products by revenue last quarter"
  metric: null
  primary_tables: [order_items, products, orders]
  variants: [canonical_join_chain, mart_version, list_price_anti, with_category_grouping]

- id: revenue_by_category
  data_product: Order Entry Analytics
  persona: SDA
  question: "Break down revenue by product category"
  metric: null
  primary_tables: [order_items, products, product_categories, orders]
  variants: [canonical_join_chain, mart_version, with_pct_of_total, recursive_category_tree]

- id: revenue_by_customer_class
  data_product: Order Entry Analytics
  persona: BID
  question: "What is total revenue by customer class?"
  metric: Revenue by Customer Class
  primary_tables: [orders, customers]
  variants: [canonical_mart, canonical_raw_join, with_aov_per_class, with_order_count]

- id: top_customers_by_clv
  data_product: Order Entry Analytics
  persona: DS
  question: "Who are our top 10 customers by lifetime value?"
  metric: CLV
  primary_tables: [orders, customers]
  variants: [canonical, with_first_order_date, with_avg_order_value, exclude_b2b_accounts]

- id: repeat_order_rate
  data_product: Order Entry Analytics
  persona: DS
  question: "What share of customers have placed more than one order?"
  metric: null
  primary_tables: [orders, customers]
  variants: [canonical_with_having, cte_based, window_function_version]

- id: order_count_by_status
  data_product: Order Entry Analytics
  persona: DE
  question: "How many orders are in each status right now?"
  metric: null
  primary_tables: [orders]
  variants: [canonical, with_pct_of_total, mart_version]
  notes: status is numeric in real data

- id: revenue_by_order_mode
  data_product: Order Entry Analytics
  persona: PM
  question: "Compare revenue across order channels (online vs in-store vs phone vs mail)"
  metric: null
  primary_tables: [orders]
  variants: [canonical, with_aov_per_mode, mart_version, with_pct_share]

- id: revenue_by_payment_method
  data_product: Order Entry Analytics
  persona: BID
  question: "What revenue comes from each payment method?"
  metric: null
  primary_tables: [orders]
  variants: [canonical, mart_version, with_aov_per_method]

- id: order_to_dispatch_lead_time
  data_product: Order Entry Analytics
  persona: SDA
  question: "What is the average time from order date to dispatch?"
  metric: null
  primary_tables: [orders, order_items]
  variants: [canonical_avg, with_percentiles, mart_version, by_warehouse]

- id: dispatch_to_delivery_lead_time
  data_product: Order Entry Analytics
  persona: SDA
  question: "How long from dispatch to estimated delivery on average?"
  metric: null
  primary_tables: [order_items]
  variants: [canonical, with_percentiles, by_delivery_type]

- id: revenue_by_delivery_type
  data_product: Order Entry Analytics
  persona: PM
  question: "What is the revenue split by delivery method (standard, express, overnight, ...)"
  metric: null
  primary_tables: [orders]
  variants: [canonical, mart_version, with_order_count]

- id: wow_revenue_change
  data_product: Order Entry Analytics
  persona: DIR
  question: "How did revenue change week-over-week?"
  metric: null
  primary_tables: [orders]
  variants: [canonical_lag, self_join_version, mart_version]

