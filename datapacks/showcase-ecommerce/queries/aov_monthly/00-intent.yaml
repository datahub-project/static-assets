id: aov_monthly
data_product: Order Entry Analytics
domain: Ecommerce Operations
question: "What is the Average Order Value (AOV) by month?"
metric: AOV
canonical_definition: |
  SUM(order_total) / COUNT(DISTINCT order_id), per month, on completed orders.
primary_tables:
  - order_entry_db.order_entry.orders
  - order_entry_db.analytics.order_details
variants:
  - canonical_raw
  - mart_version
  - weighted_avg_anti
  - with_prior_year_compare
