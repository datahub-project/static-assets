id: out_of_stock_products
data_product: Inventory & Fulfilment
domain: Ecommerce Operations
question: "Which products are currently out of stock everywhere?"
metric: null
canonical_definition: |
  Products whose SUM(quantity_on_hand) across all warehouses = 0.
  Out of stock at a single warehouse is a different question — see warehouse breakdown variant.
primary_tables:
  - order_entry_db.order_entry.inventories
  - order_entry_db.order_entry.products
  - order_entry_db.order_entry.warehouses
variants:
  - canonical_having
  - with_warehouse_breakdown
  - with_last_order_date
data_caveats: |
  - Negative quantity_on_hand can appear briefly from CDC race conditions; canonical
    query treats them as 0 by clamping.
